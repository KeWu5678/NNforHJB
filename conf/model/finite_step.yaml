# Registered model: signed network with finite-step insertion (q<1 penalty).
# (= registry.py ALIASES["finite_step"])
# finite-step needs q = 2/(power+1) < 1, i.e. power > 1, so it defaults higher.
kind: signed
insertion: finite_step
activation: relu
power: 2.0
loss_weights: [1.0, 1.0]   # [w1, w2] = [value, gradient]; l2 = [1.0, 0.0]
