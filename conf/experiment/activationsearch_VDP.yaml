# @package _global_
# activationsearch experiment: signed/profile PDAP on normalized VDP data with
# non-homogeneous activations (use_sphere=false). This file pins the *fixed*
# settings; the swept axes (activation / gamma / loss_weights / seed) are passed
# on the CLI via Hydra multirun — see `make activationsearch`.

model:
  kind: signed
  insertion: profile
  power: 1.0
  alpha: 1e-5
  use_sphere: false

data:
  path: VDP_beta_0.1_grid_30x30.npy
  normalize: true
