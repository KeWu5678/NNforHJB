# @package _global_
# activationsearch_VDP experiment: signed/profile PDAP on normalized VDP data.
# The sphere geometry follows the swept activation (each registry entry carries
# its own use_sphere — see src/config/activations.py). This file pins the *fixed*
# settings; the swept axes (activation / gamma / loss_weights / seed) are passed
# on the CLI via Hydra multirun — see `make activationsearch_VDP`.

name: activationsearch_VDP

model:
  kind: signed
  insertion: profile
  power: 1.0
  alpha: 1e-5

data:
  path: VDP_beta_0.1_grid_30x30.npy
  normalize: true
