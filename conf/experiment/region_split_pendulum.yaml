# @package _global_
# region_split_pendulum: profile each activation's accuracy in the smooth region
# vs the switching region of the pendulum value function. Pendulum data auto-selects
# the region_split eval (conf/data/pendulum.yaml). Swept axes via CLI: model.kind,
# model.activation, model.gamma — see `make region_split_pendulum`.

name: region_split_pendulum

model:
  power: 1.0
  alpha: 1e-4

data:
  normalize: true
