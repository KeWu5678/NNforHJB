hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/activationsearch
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.sweep.dir=multirun/activationsearch
    - hydra.mode=MULTIRUN
    task:
    - +experiment=activationsearch
    - env.verbose=true
    - env.seed=42
    - model.activation=tanh,softplus,matern52,gaussian
    - model.gamma=0,0.01,0.1,1,10
    - model.loss_weights=[1.0,0.0],[1.0,1.0]
  job:
    name: train
    chdir: false
    override_dirname: +experiment=activationsearch,env.seed=42,env.verbose=true,model.activation=tanh,softplus,matern52,gaussian,model.gamma=0,0.01,0.1,1,10,model.loss_weights=[1.0,0.0],[1.0,1.0]
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /Users/chaoruiz/Documents/Repos/SparseNNforHJB
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /Users/chaoruiz/Documents/Repos/SparseNNforHJB/conf
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      experiment: activationsearch
      data: vdp
      model: signed
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
model:
  kind: signed
  insertion: profile
  activation: relu
  power: 1.0
  loss_weights:
  - 1.0
  - 1.0
  use_sphere: false
  c_init: 1.0
  alpha: 1.0e-05
  gamma: 0.0
  th: 0.5
training:
  num_iterations: 10
  num_insertion: 50
  max_insert: 15
  prune_merge_tol: 0.001
  lr: 1.0
  method: levenberg_marquardt
  max_ls_iter: 500
  tolerance_ls: 1.00000001
  tolerance_grad: 0.0
  sigmamax: 10.0
  fit_outer_iterations: 20
  display_every: 2
  ins_merge_tol: 0.01
  lbfgs_lr: 0.01
  lbfgs_steps: 200
  newton_tol: 1.0e-12
  newton_max_iter: 50
data:
  path: VDP_beta_0.1_grid_30x30.npy
  normalize: true
env:
  seed: 42
  verbose: true
  log_level: INFO
  log_file: null
name: run
